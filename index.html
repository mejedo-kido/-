<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ハクスラドロップシミュレーター</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero glass-card">
      <div>
        <p class="eyebrow">Hack & Loot Lab</p>
        <h1>ハクスラドロップシミュレーター</h1>
        <p>敵を倒すより、山ほど落ちる装備を比較・厳選・合成することに特化したドロップ体験。</p>
      </div>
      <div class="wallet">
        <span>Gold</span><strong id="goldText">0</strong>
        <span>Materials</span><strong id="materialText">0</strong>
      </div>
    </header>

    <main class="dashboard">
      <section class="enemy-panel glass-card">
        <div class="section-title"><span>Enemy Area</span><small id="progressText">Wave 1</small></div>
        <div id="enemyAvatar" class="enemy-avatar">👾</div>
        <h2 id="enemyName">Loading...</h2>
        <p id="enemyLevel">Lv 1</p>
        <div class="hp-frame"><div id="enemyHpBar" class="hp-bar"></div></div>
        <p id="enemyHpText" class="muted">0 / 0 HP</p>
        <button id="attackButton" class="primary-action">攻撃</button>
      </section>

      <section class="log-panel glass-card">
        <div class="section-title"><span>Drop Log</span><button id="clearLogButton" class="ghost-button">Clear</button></div>
        <div id="dropLog" class="drop-log"></div>
      </section>

      <section class="equipment-panel glass-card">
        <div class="section-title"><span>現在装備</span><small>クリックで詳細</small></div>
        <div id="equipmentGrid" class="equipment-grid"></div>
      </section>

      <section class="inventory-panel glass-card">
        <div class="section-title"><span>インベントリ</span><small id="inventoryCount">0 / 150</small></div>
        <div class="toolbar">
          <input id="searchInput" type="search" placeholder="検索: 炎 / 剣 / God..." />
          <select id="sortSelect">
            <option value="newest">新着順</option>
            <option value="rarity">レア順</option>
            <option value="attack">攻撃順</option>
            <option value="value">売値順</option>
          </select>
          <select id="filterSelect"><option value="all">全レア</option></select>
        </div>
        <div class="bulk-actions">
          <button data-sell="Common" class="ghost-button">Common売却</button>
          <button data-sell="Magic" class="ghost-button">Magic以下売却</button>
          <button id="salvageButton" class="ghost-button">選択分解</button>
          <button id="fusionButton" class="accent-button">5個合成</button>
        </div>
        <div id="inventoryList" class="inventory-list"></div>
      </section>

      <section class="stats-panel glass-card">
        <div class="section-title"><span>プレイヤーステータス</span><button id="saveButton" class="ghost-button">Save</button></div>
        <div id="statsGrid" class="stats-grid"></div>
      </section>

      <aside class="detail-panel glass-card">
        <div class="section-title"><span>比較表示</span><small id="selectedHint">未選択</small></div>
        <div id="itemDetail" class="item-detail muted">インベントリまたは装備をクリックしてください。</div>
      </aside>
    </main>
  </div>

  <div id="effectLayer" class="effect-layer" aria-hidden="true"></div>
  <script type="module" src="script.js"></script>
</body>
</html>
